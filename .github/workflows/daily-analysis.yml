name: Daily Analysis

on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: '0 8 * * *'

  workflow_dispatch:
    # Allow manual trigger
    inputs:
      language:
        description: 'Language for report'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - en
          - zh

  # Enable workflow detection
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/daily-analysis.yml'

permissions:
  contents: write
  issues: write

jobs:
  analyze-tweets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Analyze tweets
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LANGUAGE: ${{ github.event.inputs.language || 'both' }}
        run: pnpm analyze

      - name: Commit and push reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff-index --quiet HEAD || git commit -m "feat: add Twitter analysis for $(date +%Y-%m-%d)"
          git push

      - name: Create GitHub Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const today = new Date().toISOString().split('T')[0];
            const reportPath = path.join('reports', 'latest.md');

            if (!fs.existsSync(reportPath)) {
              console.log('No report file found');
              return;
            }

            const content = fs.readFileSync(reportPath, 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Twitter Radar - ${today}`,
              body: content,
              labels: ['report', 'automated']
            });

      - name: Generate RSS feed
        run: pnpm run generate:rss

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
