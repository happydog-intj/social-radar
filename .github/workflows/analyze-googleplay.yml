name: Google Play Analysis

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 3:00 AM UTC (1 hour after App Store)
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: social-radar-reports
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write  # Required for creating issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Run Google Play analysis
        id: analysis
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          # Run analysis and capture both stdout (markdown) and stderr (logs + stats)
          pnpm analyze:googleplay > report.md 2> analysis.log

          # Extract stats from stderr
          STATS=$(grep -A1 "STATS_JSON_START" analysis.log | tail -1)
          echo "stats=$STATS" >> $GITHUB_OUTPUT

          # Show logs
          cat analysis.log

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATS='${{ steps.analysis.outputs.stats }}'
          DATE=$(echo "$STATS" | jq -r '.date')

          TITLE="🤖 Google Play Analysis - $DATE"
          LABELS="google-play,daily-report"

          # Create issue with markdown report as body
          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body-file report.md \
            --label "$LABELS")

          echo "Created issue: $ISSUE_URL"
          echo "$ISSUE_URL" > issue_url.txt

      - name: Send Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATS='${{ steps.analysis.outputs.stats }}'
          ISSUE_URL=$(cat issue_url.txt)

          DATE=$(echo "$STATS" | jq -r '.date')
          TOTAL=$(echo "$STATS" | jq -r '.total')
          POSITIVE=$(echo "$STATS" | jq -r '.positive')
          NEUTRAL=$(echo "$STATS" | jq -r '.neutral')
          NEGATIVE=$(echo "$STATS" | jq -r '.negative')
          REPLIES=$(echo "$STATS" | jq -r '.developerReplies')
          POS_PCT=$(echo "$STATS" | jq -r '.positivePercent')
          NEU_PCT=$(echo "$STATS" | jq -r '.neutralPercent')
          NEG_PCT=$(echo "$STATS" | jq -r '.negativePercent')

          MESSAGE="🤖 <b>Google Play Analysis Report</b>%0A%0A"
          MESSAGE="${MESSAGE}📅 Date: ${DATE}%0A%0A"
          MESSAGE="${MESSAGE}📊 <b>Summary:</b>%0A"
          MESSAGE="${MESSAGE}• Total Reviews: ${TOTAL}%0A"
          MESSAGE="${MESSAGE}• Developer Replies: ${REPLIES}%0A%0A"
          MESSAGE="${MESSAGE}😊 <b>Sentiment:</b>%0A"
          MESSAGE="${MESSAGE}• Positive: ${POSITIVE} (${POS_PCT}%)%0A"
          MESSAGE="${MESSAGE}• Neutral: ${NEUTRAL} (${NEU_PCT}%)%0A"
          MESSAGE="${MESSAGE}• Negative: ${NEGATIVE} (${NEG_PCT}%)%0A%0A"
          MESSAGE="${MESSAGE}🔗 <a href='${ISSUE_URL}'>View Full Report</a>"

          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
