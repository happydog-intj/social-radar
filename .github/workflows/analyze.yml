name: Twitter Analysis

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for committing reports and RSS feed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Run Twitter analysis
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: pnpm analyze

      - name: Generate RSS feed
        run: pnpm generate:rss

      - name: Commit and push reports
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add reports/ public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update analysis reports $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Send Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extract analysis results from the English report
          TODAY=$(date +'%Y-%m')
          REPORT_FILE="reports/${TODAY}/$(date +'%Y-%m-%d')-en.md"

          if [ -f "$REPORT_FILE" ]; then
            # Extract key metrics from the report
            TOTAL_TWEETS=$(grep "Total Tweets" "$REPORT_FILE" | grep -oE '[0-9]+' | head -1)
            SHEIN_RELATED=$(grep "SHEIN Related" "$REPORT_FILE" | grep -oE '[0-9]+' | head -1)
            SHEIN_PERCENT=$(grep "SHEIN Related" "$REPORT_FILE" | grep -oE '[0-9]+\.[0-9]+' | head -1)%
            POSITIVE=$(grep "😊 Positive:" "$REPORT_FILE" | grep -oE '[0-9]+' | head -1)
            NEUTRAL=$(grep "😐 Neutral:" "$REPORT_FILE" | grep -oE '[0-9]+' | head -1)
            NEGATIVE=$(grep "😞 Negative:" "$REPORT_FILE" | grep -oE '[0-9]+' | head -1)

            MESSAGE="🎯 <b>Twitter Radar Daily Report</b>%0A%0A"
            MESSAGE="${MESSAGE}📅 Date: $(date +'%Y-%m-%d')%0A%0A"
            MESSAGE="${MESSAGE}📊 <b>Analysis Summary:</b>%0A"
            MESSAGE="${MESSAGE}• Total Tweets: ${TOTAL_TWEETS}%0A"
            MESSAGE="${MESSAGE}• SHEIN Related: ${SHEIN_RELATED} (${SHEIN_PERCENT})%0A%0A"
            MESSAGE="${MESSAGE}😊 <b>Sentiment Breakdown:</b>%0A"
            MESSAGE="${MESSAGE}• Positive: ${POSITIVE}%0A"
            MESSAGE="${MESSAGE}• Neutral: ${NEUTRAL}%0A"
            MESSAGE="${MESSAGE}• Negative: ${NEGATIVE}%0A%0A"
            MESSAGE="${MESSAGE}🔗 <a href='https://${{ github.repository_owner }}.github.io/social-radar/'>View Full Report</a>%0A"
            MESSAGE="${MESSAGE}📡 <a href='https://${{ github.repository_owner }}.github.io/social-radar/feed.xml'>RSS Feed</a>"
          else
            MESSAGE="✅ <b>Twitter Analysis completed</b>%0A%0A"
            MESSAGE="${MESSAGE}📅 Date: $(date +'%Y-%m-%d')%0A"
            MESSAGE="${MESSAGE}🔗 <a href='https://${{ github.repository_owner }}.github.io/social-radar/'>View Report</a>"
          fi

          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
